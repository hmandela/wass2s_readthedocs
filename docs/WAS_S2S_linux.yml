name: WASS2S

channels:
  - conda-forge
  - hallkjc01
  - defaults

dependencies:
  # --- Core ---
  - python=3.11
  - pip
  - numpy=1.26.*
  - scipy=1.11.3
  - pandas=2.2.*
  - scikit-learn=1.5.*
  - numba>=0.59,<0.61
  - llvmlite>=0.43,<0.44
  - statsmodels=0.14.*
  - openblas

  # --- IO / Compression / Parallel ---
  - dask>=2025.1.0
  - distributed>=2025.1.0
  - h5py
  - h5netcdf
  - netcdf4
  - xarray>=2024.6,<2025.1.0
  - cf_xarray
  - cfgrib
  - eccodes
  - zarr
  - blosc
  - bottleneck
  - sparse
  - tqdm

  # --- Spatial / Geo ---
  - gdal=3.9.*
  - pyproj
  - proj
  - geos
  - shapely
  - geopandas
  - rasterio
  - rioxarray
  - regionmask
  - pykrige
  - cartopy=0.25.*
  - pycountry

  # --- Regridding / Climate Operators ---
  - xesmf
  - esmpy
  - cdo
  - python-cdo

  # --- Visualization ---
  - matplotlib=3.7.3
  - seaborn
  - bokeh
  - folium
  - xhistogram

  # --- Machine Learning ---
  - xgboost=2.1.*
  - lightgbm=4.6.*

  # --- Bayesian / Probabilistic ---
  - pymc=5.22.*
  - arviz=0.21.*
  - pytensor

  # --- Forecast Verification / Scores ---
  - properscoring
  - xskillscore=0.0.26

  # --- Climate / Weather tools ---
  - cdsapi=0.7.4
  - cftime
  - udunits2

  # --- Utilities / Notebooks ---
  - ipython
  - ipykernel
  - jupyterlab
  - jupyterlab_widgets
  - widgetsnbextension
  - black
  - rich
  - click
  - requests
  - joblib
  - pyyaml

  # --- Conda package from hallkjc01 ---
  - xcast

  # --- Pip-only packages ---
  - pip:
      - xeofs==3.0.4
      - hpelm==1.0.10
      - ibicus==1.1.3
      - fitter==1.7.1
      - minisom==2.3.5
